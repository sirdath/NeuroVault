name: Feature request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: What are you trying to do? Why is the current behaviour not enough?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: A rough sketch is fine — UX, API shape, example usage.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered (optional)
      description: Other tools, workarounds, or shapes you've thought about.
