name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Component accessibility tests
        run: npm run test:ui

      - name: Release hardening invariants
        run: npm run test:hardening

      - name: Production frontend build
        run: npm run build

  browser-smoke:
    name: Browser smoke + accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Consumer shell smoke test
        run: npm run test:e2e

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high

  rust:
    name: Rust fmt + clippy + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy — headless engine (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets --no-default-features --features model-download -- -D warnings

      # The headless check deliberately excludes src/app.rs. Keep a second
      # gate for the real Tauri target so native menu/window code is compiled.
      #
      # TAURI_CONFIG empties `externalBin` for this step only. build.rs
      # (tauri_build) validates that the sidecar staged by scripts/stage-sidecar.mjs
      # exists on EVERY compile of the crate, so on a clean checkout this step
      # died in build.rs ("resource path binaries/neurovault-server-<triple>
      # doesn't exist") before clippy ever ran. Raw Cargo also cannot reconcile
      # config-managed macOSPrivateApi=true with the package-level feature that
      # keeps it out of Store builds, so the lint-only config disables that flag.
      # The full default direct-distribution feature graph is still resolved.
      - name: Clippy — desktop GUI (deny warnings)
        working-directory: src-tauri
        env:
          TAURI_CONFIG: '{"app":{"macOSPrivateApi":false},"bundle":{"externalBin":[]}}'
        run: cargo clippy --all-targets -- -D warnings

      # Integration tests that open a real brain.db load the sqlite-vec
      # extension. vec0.dll/.dylib are committed for Windows/macOS, but Linux
      # ships none — release.yml and npm-release.yml already fetch vec0.so and
      # CI never did, so adaptive_scenario died the moment the Tests step was
      # first reached ("vec0.so not found in any candidate location"). Same
      # pinned release as the other workflows; bump all three together.
      - name: Download vec0.so (Linux)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="v0.1.9"; STRIPPED="${VERSION#v}"
          ASSET="sqlite-vec-${STRIPPED}-loadable-linux-x86_64.tar.gz"
          curl -fL --retry 5 --retry-delay 5 --retry-all-errors -o /tmp/vec.tgz \
            "https://github.com/asg017/sqlite-vec/releases/download/${VERSION}/${ASSET}"
          mkdir -p src-tauri/resources
          tar -xzf /tmp/vec.tgz -C src-tauri/resources/
          ls -lh src-tauri/resources/vec0.so

      - name: Tests
        working-directory: src-tauri
        run: cargo test --no-default-features --features model-download
