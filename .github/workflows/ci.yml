name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  rust:
    name: Rust fmt + clippy + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check

      # The tree is clippy-clean as of 2026-07-05; keep it that way.
      # --no-default-features matches the headless test/build config used
      # everywhere else (no Tauri GUI linkage needed for the check).
      - name: Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: Tests
        working-directory: src-tauri
        run: cargo test --no-default-features
