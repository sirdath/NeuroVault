# Cross-platform release pipeline for the NeuroVault VS Code extension.
#
# Trigger: push a tag matching `vscode-v*` (e.g. `git tag vscode-v0.1.0
# && git push --tags`) OR run manually from the Actions tab.
#
# Pipeline:
#   1. Build the standalone neurovault-server Rust binary on each
#      target platform in parallel (Windows x64 / macOS arm64 / Linux
#      x64), together with the verified sqlite-vec library required to
#      open a vault. Upload each pair as a workflow artifact.
#   2. On a single Linux runner: build the React UI, download every
#      platform binary into vscode-extension/server-bin/<platform>/,
#      run `vsce package` to produce one .vsix for the three explicitly
#      supported targets, and attach it to a draft GitHub Release.
#
# Marketplace publishing is intentionally NOT wired in this version.
# To enable it, set the VSCE_PAT secret (Azure DevOps PAT with
# Marketplace publish scope on the sirdath publisher) and add a
# `vsce publish --packagePath ...` step after the package step.
#
# Why a separate workflow from release.yml: the desktop app's release
# pipeline builds a Tauri-wrapped installer; the extension uses the
# same Rust crate but only the standalone bin target. Splitting keeps
# both pipelines independent — a flaky desktop signing step doesn't
# block the extension publish, and vice versa.

name: Release VS Code Extension

on:
  push:
    tags:
      - "vscode-v*"
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Stage 1: build the neurovault-server binary on each target platform.
  # -------------------------------------------------------------------------
  build-binary:
    name: Build server (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            rust-target: x86_64-pc-windows-msvc
            bin-name: neurovault-server.exe
            vec_os: windows
            vec_arch: x86_64
            vec_name: vec0.dll
            vec_sha256: 51581189d52066b4dfc6631f6d7a3eab7dedc2260656ab09ca97ab3fb8165983
            link_tool: ''
            forbidden: ''
          - os: macos-14
            platform: darwin-arm64
            rust-target: aarch64-apple-darwin
            bin-name: neurovault-server
            vec_os: macos
            vec_arch: aarch64
            vec_name: vec0.dylib
            vec_sha256: 8282126333399ddfe98bbbcc7a1936e7252625aac49df056a98be602e46bfd29
            link_tool: otool -L
            forbidden: 'WebKit|AppKit|Carbon|OSAKit|libonnxruntime'
          # Intel macOS is intentionally unsupported. A matching verified
          # x86_64 vec0 build is required before it can enter this matrix.
          - os: ubuntu-22.04
            platform: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            bin-name: neurovault-server
            vec_os: linux
            vec_arch: x86_64
            vec_name: vec0.so
            vec_sha256: b959baa1d8dc88861b1edb337b8587178cdcb12d60b4998f9d10b6a82052d5d7
            link_tool: ldd
            forbidden: 'webkit|gtk|libssl|libcrypto|libonnxruntime'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.rust-target }}

      # Cache Cargo's target dir per platform. Release profile uses
      # lto=fat + codegen-units=1, so a cold build is 4-6 minutes.
      # With this cache, incremental rebuilds drop to ~90s.
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.rust-target }}-server

      - name: Build neurovault-server (release)
        working-directory: src-tauri
        run: cargo build --release --no-default-features --bin neurovault-server --target ${{ matrix.rust-target }}

      - name: Stage server with verified sqlite-vec
        shell: bash
        run: |
          set -euo pipefail
          VERSION="v0.1.9"
          ASSET="sqlite-vec-0.1.9-loadable-${{ matrix.vec_os }}-${{ matrix.vec_arch }}.tar.gz"
          ARCHIVE="$RUNNER_TEMP/vec0.tgz"
          STAGE="$RUNNER_TEMP/server-package"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          curl -fL --retry 5 --retry-delay 5 --retry-all-errors \
            -o "$ARCHIVE" \
            "https://github.com/asg017/sqlite-vec/releases/download/${VERSION}/${ASSET}"
          if command -v sha256sum >/dev/null 2>&1; then
            ACTUAL=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          else
            ACTUAL=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')
          fi
          test "$ACTUAL" = "${{ matrix.vec_sha256 }}" || {
            echo "::error::sqlite-vec checksum mismatch for $ASSET"
            exit 1
          }
          tar -xzf "$ARCHIVE" -C "$STAGE"
          cp "src-tauri/target/${{ matrix.rust-target }}/release/${{ matrix.bin-name }}" "$STAGE/"
          test -s "$STAGE/${{ matrix.bin-name }}"
          test -s "$STAGE/${{ matrix.vec_name }}"
          ls -lh "$STAGE"

      - name: Verify the server is truly headless
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN="$RUNNER_TEMP/server-package/${{ matrix.bin-name }}"
          ${{ matrix.link_tool }} "$BIN" | tee "$RUNNER_TEMP/server-links.txt"
          if grep -qiE '${{ matrix.forbidden }}' "$RUNNER_TEMP/server-links.txt"; then
            echo "::error::GUI, OpenSSL, or dynamic ONNX dependency leaked into the VS Code server"
            exit 1
          fi

      - name: Smoke server and sqlite-vec before packaging
        shell: bash
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/server-package"
          BIN="$STAGE/${{ matrix.bin-name }}"
          export NEUROVAULT_HOME="$RUNNER_TEMP/neurovault-vscode-smoke"
          export NEUROVAULT_VEC_EXTENSION="$STAGE/${{ matrix.vec_name }}"
          "$BIN" --help >/dev/null
          "$BIN" --port 8798 &
          SRV=$!
          trap 'kill "$SRV" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8798/api/version >/dev/null 2>&1 && break || sleep 1
          done
          curl -fsS http://127.0.0.1:8798/api/version | grep -q '"version"'
          curl -fsS -X POST http://127.0.0.1:8798/api/brains \
            -H 'content-type: application/json' -d '{"name":"smoke"}' >/dev/null
          curl -fsS http://127.0.0.1:8798/api/brains/smoke/stats | grep -q '"brain_id"'
          kill "$SRV" 2>/dev/null || true
          trap - EXIT

      # The downstream Linux packaging job restores executable bits after
      # artifact download, which does not preserve Unix modes.
      - name: Upload server package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: server-bin-${{ matrix.platform }}
          path: ${{ runner.temp }}/server-package/
          retention-days: 7

  # -------------------------------------------------------------------------
  # Stage 2: package the .vsix on a single Linux runner. Pulls every
  # platform binary from stage 1, builds the React UI, runs vsce.
  # -------------------------------------------------------------------------
  package-extension:
    name: Package .vsix
    needs: build-binary
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed by softprops/action-gh-release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install root deps
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Build React UI
        run: npm run build

      - name: Install extension deps
        working-directory: vscode-extension
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Bundle extension JS (esbuild)
        working-directory: vscode-extension
        run: npm run build

      - name: Download all server binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: server-bin-*

      - name: Stage server binaries
        working-directory: vscode-extension
        run: |
          set -euo pipefail
          rm -rf server-bin
          for plat in win32-x64 darwin-arm64 linux-x64; do
            mkdir -p "server-bin/$plat"
          done
          cp "../artifacts/server-bin-win32-x64/neurovault-server.exe" "server-bin/win32-x64/"
          cp "../artifacts/server-bin-win32-x64/vec0.dll" "server-bin/win32-x64/"
          cp "../artifacts/server-bin-darwin-arm64/neurovault-server" "server-bin/darwin-arm64/"
          cp "../artifacts/server-bin-darwin-arm64/vec0.dylib" "server-bin/darwin-arm64/"
          cp "../artifacts/server-bin-linux-x64/neurovault-server" "server-bin/linux-x64/"
          cp "../artifacts/server-bin-linux-x64/vec0.so" "server-bin/linux-x64/"
          chmod +x server-bin/darwin-arm64/neurovault-server server-bin/linux-x64/neurovault-server
          find server-bin -type f -size 0 -print -quit | grep -q . && {
            echo "::error::empty VS Code native asset"
            exit 1
          }
          ls -lah server-bin/*/

      - name: Stage UI, legal files, and verify every supported platform
        working-directory: vscode-extension
        run: npm run assets -- --all-platforms

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          declared=$(node -p "require('./vscode-extension/package.json').version")
          if [[ "$GITHUB_REF" == refs/tags/vscode-v* ]]; then
            v="${GITHUB_REF_NAME#vscode-v}"
            if [ "$v" != "$declared" ]; then
              echo "::error::tag version $v does not match vscode-extension/package.json $declared"
              exit 1
            fi
          else
            v="$declared"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

      - name: Package .vsix
        working-directory: vscode-extension
        run: |
          set -euo pipefail
          FILE="neurovault-${{ steps.version.outputs.version }}.vsix"
          npx vsce package --out "$FILE"
          for required in \
            extension/LICENSE \
            extension/PRIVACY.md \
            extension/THIRD-PARTY-NOTICES.md \
            extension/LICENSES/MPL-2.0-COVERED-SOURCE.md \
            extension/LICENSES/NATIVE-NOTICE-SOURCES.json \
            extension/LICENSES/THIRD-PARTY-LICENSES.txt \
            extension/LICENSES/models/DOWNLOADED-MODELS.md \
            extension/LICENSES/native/bge-small-en-v1.5-LICENSE-MIT \
            extension/LICENSES/native/onnxruntime-1.20.0-LICENSE \
            extension/LICENSES/native/onnxruntime-1.20.0-ThirdPartyNotices.txt \
            extension/LICENSES/native/sqlite-vec-v0.1.9-LICENSE-APACHE \
            extension/LICENSES/native/sqlite-vec-v0.1.9-LICENSE-MIT \
            extension/server-bin/win32-x64/neurovault-server.exe \
            extension/server-bin/win32-x64/vec0.dll \
            extension/server-bin/darwin-arm64/neurovault-server \
            extension/server-bin/darwin-arm64/vec0.dylib \
            extension/server-bin/linux-x64/neurovault-server \
            extension/server-bin/linux-x64/vec0.so; do
            unzip -Z1 "$FILE" | grep -Fx "$required" >/dev/null || {
              echo "::error::$required is missing from $FILE"
              exit 1
            }
          done

      - name: Upload .vsix as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: neurovault-vscode-${{ steps.version.outputs.version }}
          path: vscode-extension/*.vsix
          retention-days: 30

      # Only attach to a GitHub Release when triggered by a tag push;
      # workflow_dispatch runs publish only the workflow artifact above.
      - name: Attach .vsix to draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "NeuroVault for VS Code ${{ github.ref_name }}"
          draft: true
          prerelease: false
          body: |
            ## NeuroVault for VS Code ${{ github.ref_name }}

            ### Install (manual, before Marketplace publish)
            1. Download the `.vsix` below.
            2. In VS Code or Cursor: Ctrl+Shift+P → "Extensions: Install from VSIX"
            3. Pick the downloaded file.

            Once published to the Marketplace this release page is
            informational only — most users will install via
            `ext install sirdath.neurovault` or the Marketplace
            UI.

            Bundled binaries cover Windows x64, macOS Apple Silicon,
            and Linux x64. Each includes the sqlite-vec library required
            to open a vault. macOS Intel is not supported by this build.
          files: vscode-extension/*.vsix
