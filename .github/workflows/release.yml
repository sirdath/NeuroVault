name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # --- Build Python sidecars per platform ---------------------------------
  build-sidecar:
    name: Build sidecar (${{ matrix.os-label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-label: windows
            target-triple: x86_64-pc-windows-msvc
            sidecar-src: server/dist/neurovault-server.exe
            sidecar-ext: ".exe"
          - os: macos-14   # Apple Silicon (M-series)
            os-label: macos-arm64
            target-triple: aarch64-apple-darwin
            sidecar-src: server/dist/neurovault-server
            sidecar-ext: ""
          - os: macos-13   # Intel
            os-label: macos-x64
            target-triple: x86_64-apple-darwin
            sidecar-src: server/dist/neurovault-server
            sidecar-ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python deps + build sidecar
        working-directory: server
        run: |
          uv sync --extra dev
          uv pip install pyinstaller
          uv run pyinstaller neurovault_server.spec --clean --noconfirm

      - name: Stage sidecar binary with target triple
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp "${{ matrix.sidecar-src }}" "src-tauri/binaries/neurovault-server-${{ matrix.target-triple }}${{ matrix.sidecar-ext }}"
          chmod +x "src-tauri/binaries/neurovault-server-${{ matrix.target-triple }}${{ matrix.sidecar-ext }}" || true

      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.os-label }}
          path: src-tauri/binaries/neurovault-server-${{ matrix.target-triple }}${{ matrix.sidecar-ext }}

  # --- Build Tauri app per platform ---------------------------------------
  build-tauri:
    name: Build app (${{ matrix.os-label }})
    needs: build-sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-label: windows
            sidecar-artifact: sidecar-windows
            rust-target: x86_64-pc-windows-msvc
          - os: macos-14
            os-label: macos-arm64
            sidecar-artifact: sidecar-macos-arm64
            rust-target: aarch64-apple-darwin
          - os: macos-13
            os-label: macos-x64
            sidecar-artifact: sidecar-macos-x64
            rust-target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.sidecar-artifact }}
          path: src-tauri/binaries

      - name: Make sidecar executable (macOS/Linux)
        if: runner.os != 'Windows'
        run: chmod +x src-tauri/binaries/*

      - name: Install frontend deps
        run: npm ci

      - name: Extract CHANGELOG section for this tag
        id: changelog
        shell: bash
        run: |
          # ref_name looks like "v0.1.2"; CHANGELOG headings use "## [0.1.2]".
          VERSION="${GITHUB_REF_NAME#v}"
          body=""
          if [ -f CHANGELOG.md ]; then
            body=$(awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { flag=1; next }
              flag && /^## \[/ { flag=0 }
              flag { print }
            ' CHANGELOG.md)
          fi
          if [ -z "$body" ]; then
            body="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for the full release notes."
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$body"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.rust-target }}
          tagName: ${{ github.ref_name }}
          releaseName: "NeuroVault ${{ github.ref_name }}"
          releaseBody: |
            ## NeuroVault ${{ github.ref_name }}

            ${{ steps.changelog.outputs.body }}

            ---

            **Windows**: `NeuroVault_x64-setup.exe`
            **macOS (Apple Silicon)**: `NeuroVault_aarch64.dmg`
            **macOS (Intel)**: `NeuroVault_x64.dmg`

            The app auto-updates — future releases will be installed automatically.

            Full changelog: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md
          releaseDraft: false
          prerelease: false
