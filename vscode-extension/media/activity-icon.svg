<!-- Activity-bar icon. VS Code expects a 24x24 monochrome SVG that uses
     `currentColor` so it inherits the active / inactive sidebar tint.
     Stylised neural-graph: three nodes, two edges, NeuroVault's symbol. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
     stroke-linejoin="round">
  <circle cx="12" cy="5"  r="2.2" fill="currentColor"/>
  <circle cx="5"  cy="17" r="2.2" fill="currentColor"/>
  <circle cx="19" cy="17" r="2.2" fill="currentColor"/>
  <line x1="12" y1="7.2" x2="5"  y2="14.8"/>
  <line x1="12" y1="7.2" x2="19" y2="14.8"/>
  <line x1="7.2" y1="17" x2="16.8" y2="17"/>
</svg>
