<!-- Website favicon. Same brand mark as the activity-bar icon, but
     drawn at viewBox 32x32 so it survives browser-tab compression
     and uses the peach brand colour (so it reads on every site
     header background). The mark stays legible down to 16x16 because
     stroke widths scale linearly with viewBox size. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none"
     stroke="#FFAF87" stroke-width="1.8" stroke-linecap="round"
     stroke-linejoin="round">
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13"/>

  <!-- Connecting lines from each node to the central hub -->
  <line x1="16"   y1="11.0" x2="16"   y2="15.4"/>
  <line x1="9.7"  y1="20.8" x2="14.2" y2="18.4"/>
  <line x1="22.3" y1="20.8" x2="17.8" y2="18.4"/>

  <!-- Three filled nodes -->
  <circle cx="16"   cy="9.0"  r="2.0" fill="#FFAF87" stroke="none"/>
  <circle cx="8.2"  cy="21.4" r="2.0" fill="#FFAF87" stroke="none"/>
  <circle cx="23.8" cy="21.4" r="2.0" fill="#FFAF87" stroke="none"/>

  <!-- Central hub + key tail -->
  <circle cx="16" cy="17.0" r="1.8"/>
  <line x1="16" y1="18.8" x2="16" y2="21.0"/>
</svg>
