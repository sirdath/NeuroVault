<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Docs — NeuroVault</title>
<meta name="description" content="Documentation for NeuroVault — local-first AI memory layer. Architecture, HTTP API, and design docs." />
<meta name="theme-color" content="#0b0b12" />

<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="./docs.css" />
<link rel="stylesheet" href="./lib/highlight-atom-dark.css" />

<!-- Apply stored theme before paint (avoids peach → blue flash on reload).
     Same script as the landing page so the user's choice persists across
     /index.html and /docs/. -->
<script>
  try {
    if (localStorage.getItem("nv.theme") === "blue") {
      document.documentElement.setAttribute("data-theme", "blue");
      var m = document.querySelector('meta[name="theme-color"]');
      if (m) m.setAttribute("content", "#0a1628");
    }
  } catch (e) {}
</script>
</head>

<body class="docs-body">

<!-- Same nav as the landing page so the brand reads continuously.
     The "Docs" link is marked active. -->
<header class="nav">
  <a href="../index.html#top" class="nav-logo" aria-label="NeuroVault home">
    <svg viewBox="0 0 24 24" class="nav-logo-icon" width="32" height="32"
         fill="none" stroke="currentColor" stroke-width="1.4"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
         style="color: var(--peach);">
      <circle cx="12" cy="12" r="9.5" />
      <line x1="12" y1="8.4" x2="12" y2="11.6" />
      <line x1="7.5" y1="15.6" x2="10.7" y2="13.8" />
      <line x1="16.5" y1="15.6" x2="13.3" y2="13.8" />
      <circle cx="12" cy="6.9" r="1.5" fill="currentColor" stroke="none" />
      <circle cx="6.4" cy="16" r="1.5" fill="currentColor" stroke="none" />
      <circle cx="17.6" cy="16" r="1.5" fill="currentColor" stroke="none" />
      <circle cx="12" cy="12.8" r="1.4" />
      <line x1="12" y1="14.2" x2="12" y2="15.7" />
    </svg>
    <span class="nav-logo-text">NeuroVault</span>
  </a>
  <nav class="nav-links">
    <a href="../index.html#features">Features</a>
    <a href="../index.html#how">How it works</a>
    <a href="./" class="nav-link-active">Docs</a>
    <a href="https://github.com/sirdath/NeuroVault" target="_blank" rel="noopener">GitHub ↗</a>
  </nav>
  <button id="theme-toggle" class="theme-toggle" type="button"
          aria-label="Switch color theme" title="Switch color theme">
    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
  <a href="../index.html#download" class="nav-cta">Download</a>
</header>

<!-- Mobile sidebar toggle. On desktop the sidebar is always visible;
     on narrow screens it slides in/out. -->
<button id="sidebar-toggle" class="sidebar-toggle" type="button"
        aria-label="Open table of contents" aria-controls="docs-sidebar">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
  <span>Table of contents</span>
</button>

<main class="docs-layout">

  <!-- Sidebar: data-driven from docs.js so adding a page = one line.
       The sections / items mirror the markdown files in ./content/. -->
  <aside id="docs-sidebar" class="docs-sidebar" aria-label="Documentation navigation">
    <nav class="docs-nav">
      <!-- docs.js populates this -->
    </nav>
  </aside>

  <!-- Content pane: rendered markdown lands in #docs-content. The
       hash-fragment from the URL picks which markdown file loads. -->
  <article class="docs-content-wrap">
    <div id="docs-content" class="docs-content">
      <!-- Initial state — replaced by rendered markdown once docs.js runs.
           Visible only briefly before the first fetch resolves. -->
      <p class="docs-loading">Loading documentation…</p>
    </div>

    <!-- Per-page footer with edit link + last-modified note.
         Populated by docs.js per page. -->
    <footer class="docs-page-footer">
      <p>
        Source on GitHub:
        <a id="docs-edit-link" href="https://github.com/sirdath/NeuroVault/tree/main/docs"
           target="_blank" rel="noopener">
          docs/
        </a>
        — pull requests welcome.
      </p>
    </footer>
  </article>

  <!-- On-page TOC: built from the H2/H3 headings of the rendered page.
       Sticky on desktop so it follows the scroll. -->
  <aside class="docs-on-page-toc" aria-label="On-page table of contents">
    <p class="docs-on-page-toc-label">On this page</p>
    <ul id="docs-on-page-toc-list"></ul>
  </aside>

</main>

<!-- Vendored libraries — no CDN calls at runtime so docs work offline.
     marked: ~35 KB, MIT, https://github.com/markedjs/marked
     highlight.js: ~120 KB, BSD-3, https://github.com/highlightjs/highlight.js -->
<script src="./lib/marked.min.js"></script>
<script src="./lib/highlight.min.js"></script>
<script src="./docs.js"></script>

<!-- Reuse the landing-page theme toggle so light/dark/blue state stays
     consistent between /index.html and /docs/. -->
<script src="../script.js"></script>

</body>
</html>
